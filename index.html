  <style>
    /* Prevent white flash during load */
    html,
    body {
      background-color: #ffffff !important;
      margin: 0;
      padding: 0;
    }

    /* 彻底消除所有元素的点击/聚焦黑框 */
    *,
    *:focus,
    *:focus-visible,
    *:focus-within,
    *:active {
      outline: none !important;
      -webkit-tap-highlight-color: transparent !important;
      -webkit-focus-ring-color: transparent !important;
    }

    /* Loading screen with butterfly animation */
    #app-loading-overlay {
      position: fixed;
      inset: 0;
      width: 100%;
      /* 使用多种高度单位确保在各种浏览器/设备上都能覆盖完整视口 */
      height: 100%;
      height: 100vh;
      height: 100dvh;
      /* 向四周扩展以确保覆盖安全区 */
      min-height: -webkit-fill-available;
      background-color: #ffffff;
      z-index: 99999;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: opacity 0.4s ease;
      /* 确保不受父元素影响 */
      overflow: hidden;
    }

    #app-loading-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* 在 loading 期间隐藏所有底层内容，防止穿帮 */
    body.app-loading #nuo-os-root {
      opacity: 0 !important;
      visibility: hidden !important;
    }

    body.app-loading #desktop-dock,
    body.app-loading #home-screen-pages {
      opacity: 0 !important;
      visibility: hidden !important;
    }

    /* Butterfly loader by WerlynDev - Uiverse.io */
    .loader {
      --sizeLoader: 60px;
      --sizeLoaderHalf: calc(var(--sizeLoader) / 2);
      --stepBtf: calc(var(--sizeLoader) / 10);
      display: flex;
      position: relative;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      width: var(--sizeLoader);
      height: var(--sizeLoader);
      right: var(--sizeLoaderHalf);
      transform-origin: center right;
      animation: moveAround 2s linear infinite;
      filter: drop-shadow(0 10px 10px rgba(0, 0, 0, 0.2));
    }

    .loader svg:nth-child(1) {
      position: relative;
      height: 100%;
      left: 2%;
      transform-origin: center right;
      animation: wing 0.5s ease-in-out infinite;
    }

    .loader svg:nth-child(2) {
      height: 50%;
    }

    .loader svg:nth-child(3) {
      position: relative;
      height: 100%;
      left: -2%;
      transform-origin: center left;
      animation: wing 0.5s ease-in-out infinite;
    }

    @keyframes wing {
      0% {
        transform: rotateY(0deg);
      }

      50% {
        transform: rotateY(60deg);
      }

      100% {
        transform: rotateY(0deg);
      }
    }

    @keyframes moveAround {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>

  <script>
    (function () {
      const HARD_BOOT_TIMEOUT_MS = 3500;

      function forceRemoveLoadingOverlay(reason) {
        const loadingOverlay = document.getElementById('app-loading-overlay');
        document.body.classList.remove('app-loading');

        if (!loadingOverlay) return;
        if (!loadingOverlay.classList.contains('fade-out')) {
          console.warn('[boot watchdog] force removing loading overlay:', reason);
          loadingOverlay.classList.add('fade-out');
        }

        window.setTimeout(() => {
          if (loadingOverlay && loadingOverlay.parentNode) {
            loadingOverlay.remove();
          }
        }, 450);
      }

      window.__nuojijiForceRemoveLoadingOverlay = forceRemoveLoadingOverlay;

      window.setTimeout(() => {
        forceRemoveLoadingOverlay('hard-timeout');
      }, HARD_BOOT_TIMEOUT_MS);

      window.addEventListener('load', function () {
        window.setTimeout(() => {
          const root = document.getElementById('root');
          const appRoot = document.getElementById('nuo-os-root');
          const loadingOverlay = document.getElementById('app-loading-overlay');
          const hasVisibleAppShell = !!(appRoot || (root && root.children && root.children.length > 0));
          if (loadingOverlay && hasVisibleAppShell) {
            forceRemoveLoadingOverlay('window-load');
          }
        }, 800);
      }, { once: true });
    })();

    // 在 React 加载前立即检查锁屏设置，防止 dock 闪现
    (function () {
      const lockEnabled = localStorage.getItem('lockScreenEnabled') === 'true';
      const alreadyUnlocked = sessionStorage.getItem('unlocked') === 'true';

      if (lockEnabled && !alreadyUnlocked) {
        document.body.classList.add('locking-mode');
      }
    })();
  </script>
  <div id="root"></div>
